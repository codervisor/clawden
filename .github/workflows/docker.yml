name: Build & Push ClawDen Runtime Images

on:
  push:
    tags: ["v*"]
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Runtime target to publish"
        required: false
        default: "openclaw"
        type: choice
        options:
          - openclaw
          - openclaw-browser
          - openclaw-computer
          - zeroclaw
          - zeroclaw-browser
          - zeroclaw-computer
          - all
      include_arm64:
        description: "Also build linux/arm64"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: codervisor

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      matrix: ${{ steps.decide.outputs.matrix }}
    steps:
      - name: Decide whether image build should run and which targets
        id: decide
        shell: bash
        run: |
          SHOULD_RUN=false
          MATRIX='[]'

          ALL_TARGETS='[{"target":"openclaw"},{"target":"zeroclaw"},{"target":"openclaw-browser"},{"target":"zeroclaw-browser"},{"target":"openclaw-computer"},{"target":"zeroclaw-computer"}]'

          if [ "${{ github.event_name }}" = "push" ]; then
            SHOULD_RUN=true
            MATRIX='[{"target":"openclaw"}]'
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            SHOULD_RUN=true
            MATRIX='[{"target":"openclaw"}]'
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD_RUN=true
            TARGET="${{ inputs.target }}"
            if [ "$TARGET" = "all" ]; then
              MATRIX="$ALL_TARGETS"
            else
              MATRIX="[{\"target\":\"${TARGET}\"}]"
            fi
          fi

          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.precheck.outputs.matrix) }}
    steps:
      - name: Check out triggering commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check out repository
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-arch)
        if: github.event_name == 'workflow_dispatch' && inputs.include_arm64
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"

          case "$TARGET" in
            openclaw)
              REPOSITORY="openclaw"
              VERSION_ARG="OPENCLAW_VERSION"
              IMMUTABLE_SUFFIX=""
              MOVING_ALIAS="latest"
              ;;
            openclaw-browser)
              REPOSITORY="openclaw"
              VERSION_ARG="OPENCLAW_VERSION"
              IMMUTABLE_SUFFIX="-browser"
              MOVING_ALIAS="browser"
              ;;
            openclaw-computer)
              REPOSITORY="openclaw"
              VERSION_ARG="OPENCLAW_VERSION"
              IMMUTABLE_SUFFIX="-computer"
              MOVING_ALIAS="computer"
              ;;
            zeroclaw)
              REPOSITORY="zeroclaw"
              VERSION_ARG="ZEROCLAW_VERSION"
              IMMUTABLE_SUFFIX=""
              MOVING_ALIAS="latest"
              ;;
            zeroclaw-browser)
              REPOSITORY="zeroclaw"
              VERSION_ARG="ZEROCLAW_VERSION"
              IMMUTABLE_SUFFIX="-browser"
              MOVING_ALIAS="browser"
              ;;
            zeroclaw-computer)
              REPOSITORY="zeroclaw"
              VERSION_ARG="ZEROCLAW_VERSION"
              IMMUTABLE_SUFFIX="-computer"
              MOVING_ALIAS="computer"
              ;;
            *)
              echo "Unknown target: $TARGET" >&2
              exit 1
              ;;
          esac

          VERSION="$(sed -n "s/^ARG ${VERSION_ARG}=//p" docker/Dockerfile | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Failed to extract ${VERSION_ARG} from docker/Dockerfile" >&2
            exit 1
          fi

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${REPOSITORY}"
          IMMUTABLE_TAG="${IMAGE}:${VERSION}${IMMUTABLE_SUFFIX}"

          if [ "${{ github.event_name }}" = "push" ]; then
            TAGS="${IMMUTABLE_TAG}"
            TAGS+=$'\n'"${IMAGE}:${MOVING_ALIAS}"
          else
            TAGS="${IMAGE}:preview${IMMUTABLE_SUFFIX}"
          fi

          echo "repository=${REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "runtime_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "immutable_tag=${IMMUTABLE_TAG}" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Select build platforms
        id: platforms
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include_arm64 }}" = "true" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, smoke test, and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: ${{ steps.platforms.outputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
